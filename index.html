<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SentimentLens Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --muted: #888899;
    --accent: #7c6af7;
    --accent-dim: rgba(124,106,247,0.15);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  #root { width: 100%; }

  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent-dim);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--accent); }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid;
    transition: all 0.3s;
  }
  .status-pill.connected {
    background: var(--green-dim);
    color: var(--green);
    border-color: rgba(52,211,153,0.3);
  }
  .status-pill.disconnected {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(248,113,113,0.3);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-dot.pulse {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--accent);
    color: white;
  }
  .tab-btn:hover:not(.active) {
    color: var(--text);
    background: var(--surface2);
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Inputs */
  textarea, input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    padding: 10px 13px;
    outline: none;
    transition: border 0.2s;
    resize: vertical;
  }
  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }
  textarea::placeholder, input::placeholder { color: var(--muted); }
  textarea { min-height: 100px; }

  /* Char count */
  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }
  .char-count { font-size: 12px; color: var(--muted); }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover:not(:disabled) {
    background: #6b5ae0;
    transform: translateY(-1px);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: var(--red-dim);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--red);
    font-size: 14px;
    margin-bottom: 16px;
  }

  /* Result card */
  .result-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .sentiment-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid;
  }
  .sentiment-badge.positive {
    background: var(--green-dim);
    color: var(--green);
    border-color: rgba(52,211,153,0.3);
  }
  .sentiment-badge.negative {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(248,113,113,0.3);
  }
  .sentiment-badge.neutral {
    background: var(--yellow-dim);
    color: var(--yellow);
    border-color: rgba(251,191,36,0.3);
  }

  /* Confidence bar */
  .conf-row { margin-top: 16px; }
  .conf-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .conf-label span:last-child { color: var(--text); font-weight: 600; }
  .conf-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }
  .conf-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.6s ease;
  }
  .conf-fill.positive { background: var(--green); }
  .conf-fill.negative { background: var(--red); }
  .conf-fill.neutral { background: var(--yellow); }

  /* Brand stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .stat-value.total { color: var(--text); }
  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }
  .stat-value.neu { color: var(--yellow); }
  .stat-label { font-size: 12px; color: var(--muted); }

  /* Brand bar chart */
  .brand-bar {
    display: flex;
    height: 10px;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 16px;
    gap: 2px;
  }
  .brand-bar-seg { height: 100%; transition: width 0.5s ease; }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 17px; }
    .tab-btn { font-size: 13px; padding: 8px 10px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = "https://web-production-53c4b.up.railway.app";

function getSentimentClass(s) {
  if (!s) return "neutral";
  const l = s.toLowerCase();
  if (l.includes("pos")) return "positive";
  if (l.includes("neg")) return "negative";
  return "neutral";
}

function getSentimentIcon(s) {
  const c = getSentimentClass(s);
  if (c === "positive") return "↑";
  if (c === "negative") return "↓";
  return "→";
}

function ConfBar({ value, cls }) {
  return (
    <div className="conf-row">
      <div className="conf-label">
        <span>Confidence</span>
        <span>{value}%</span>
      </div>
      <div className="conf-track">
        <div className="conf-fill" style={{ width: `${value}%` }} />
      </div>
    </div>
  );
}

function TweetTab({ connected }) {
  const [tweet, setTweet] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const analyze = async () => {
    if (!tweet.trim()) return;
    setError(""); setResult(null); setLoading(true);
    try {
      const res = await fetch(`${API}/predict/tweet`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: tweet })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Request failed");
      setResult(data);
    } catch (e) {
      setError(e.message || "Failed to connect. Check backend or CORS.");
    } finally { setLoading(false); }
  };

  const cls = result ? getSentimentClass(result.sentiment) : "neutral";

  return (
    <div>
      {error && <div className="error-box">⚠ {error}</div>}
      <div className="card">
        <div className="card-label">Tweet text</div>
        <textarea
          placeholder="Paste a tweet to analyze sentiment..."
          value={tweet}
          onChange={e => setTweet(e.target.value)}
          rows={4}
        />
        <div className="input-footer">
          <span className="char-count">{tweet.length} chars</span>
          <button
            className="btn btn-primary"
            onClick={analyze}
            disabled={loading || !tweet.trim() || !connected}
          >
            {loading ? <><span className="spinner"></span> Analyzing…</> : "Analyze"}
          </button>
        </div>

        {result && (
          <div className="result-section">
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <span className={`sentiment-badge ${cls}`}>
                {getSentimentIcon(result.sentiment)} {result.sentiment}
              </span>
            </div>
            <ConfBar value={result.confidence} cls={cls} />
          </div>
        )}
      </div>
    </div>
  );
}

function BrandTab({ connected }) {
  const [brand, setBrand] = useState("google");
  const [tweets, setTweets] = useState("");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const analyze = async () => {
    const list = tweets.split("\n").filter(t => t.trim() !== "");
    if (!list.length || !brand.trim()) return;
    setError(""); setData(null); setLoading(true);
    try {
      const res = await fetch(`${API}/analyze/brand`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ brand, tweets: list })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.detail || "Brand analysis failed");
      setData(json);
    } catch (e) {
      setError(e.message || "Brand API failed. Check backend.");
    } finally { setLoading(false); }
  };

  const total = data?.total_mentions || 0;
  const pos = data?.positive || 0;
  const neg = data?.negative || 0;
  const neu = total - pos - neg;
  const posW = total ? (pos / total * 100).toFixed(1) : 0;
  const negW = total ? (neg / total * 100).toFixed(1) : 0;
  const neuW = total ? (neu / total * 100).toFixed(1) : 0;

  return (
    <div>
      {error && <div className="error-box">⚠ {error}</div>}
      <div className="card">
        <div className="card-label">Brand name</div>
        <input
          type="text"
          value={brand}
          onChange={e => setBrand(e.target.value)}
          placeholder="e.g. google, apple, netflix"
        />
      </div>

      <div className="card">
        <div className="card-label">Tweets (one per line)</div>
        <textarea
          placeholder={`Paste tweets here, one per line…\nLove the new Google AI features!\nGoogle search has gotten worse lately.`}
          value={tweets}
          onChange={e => setTweets(e.target.value)}
          style={{ minHeight: 140 }}
        />
        <div className="input-footer">
          <span className="char-count">
            {tweets.split("\n").filter(t => t.trim()).length} tweets
          </span>
          <button
            className="btn btn-primary"
            onClick={analyze}
            disabled={loading || !tweets.trim() || !brand.trim() || !connected}
          >
            {loading ? <><span className="spinner"></span> Analyzing…</> : "Analyze brand"}
          </button>
        </div>

        {data && (
          <div className="result-section">
            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-value total">{total}</div>
                <div className="stat-label">Total mentions</div>
              </div>
              <div className="stat-card">
                <div className="stat-value pos">{pos}</div>
                <div className="stat-label">Positive</div>
              </div>
              <div className="stat-card">
                <div className="stat-value neg">{neg}</div>
                <div className="stat-label">Negative</div>
              </div>
              {neu > 0 && (
                <div className="stat-card">
                  <div className="stat-value neu">{neu}</div>
                  <div className="stat-label">Neutral</div>
                </div>
              )}
            </div>

            {total > 0 && (
              <>
                <div className="brand-bar" style={{ marginTop: 20 }}>
                  <div className="brand-bar-seg" style={{ background: "var(--green)", width: `${posW}%` }} />
                  <div className="brand-bar-seg" style={{ background: "var(--yellow)", width: `${neuW}%` }} />
                  <div className="brand-bar-seg" style={{ background: "var(--red)", width: `${negW}%` }} />
                </div>
                <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 12, color: "var(--muted)" }}>
                  <span style={{ color: "var(--green)" }}>▪ {posW}% positive</span>
                  <span style={{ color: "var(--yellow)" }}>▪ {neuW}% neutral</span>
                  <span style={{ color: "var(--red)" }}>▪ {negW}% negative</span>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [connected, setConnected] = useState(null);
  const [tab, setTab] = useState("tweet");

  useEffect(() => {
    fetch(`${API}/docs`).then(r => setConnected(r.ok)).catch(() => setConnected(false));
  }, []);

  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <div className="logo-icon">◎</div>
          <h1>Sentiment<span>Lens</span> Pro</h1>
        </div>
        <div
          className={`status-pill ${connected === true ? "connected" : "disconnected"}`}
          onClick={() => fetch(`${API}/docs`).then(r => setConnected(r.ok)).catch(() => setConnected(false))}
          style={{ cursor: "pointer" }}
        >
          <div className={`status-dot ${connected === null ? "pulse" : ""}`} />
          {connected === null ? "Connecting…" : connected ? "Backend connected" : "Not connected"}
        </div>
      </div>

      <div className="tabs">
        <button className={`tab-btn ${tab === "tweet" ? "active" : ""}`} onClick={() => setTab("tweet")}>
          Tweet analysis
        </button>
        <button className={`tab-btn ${tab === "brand" ? "active" : ""}`} onClick={() => setTab("brand")}>
          Brand analysis
        </button>
      </div>

      {tab === "tweet" && <TweetTab connected={!!connected} />}
      {tab === "brand" && <BrandTab connected={!!connected} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
